<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 字段标注工具</title>
</head>
<body>
  <header class="toolbar">
    <label class="file-label">
      <span>选择 PDF</span>
      <input type="file" id="fileInput" accept="application/pdf" />
    </label>
    <button type="button" id="exportBtn" class="btn-export" disabled>导出 JSON</button>
    <label class="file-label">
      <span>导入 JSON</span>
      <input type="file" id="importJsonInput" accept=".json,application/json" />
    </label>
    <span id="status" class="status"></span>
  </header>

  <!-- 导出配置弹窗 -->
  <div id="exportModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="exportModalBackdrop"></div>
    <div class="modal-dialog">
      <h3 class="modal-title">导出配置</h3>
      <div class="modal-body">
        <label class="form-label">checkboxSymbol（复选框符号图片路径）</label>
        <input type="text" id="exportCheckboxSymbol" class="form-input" placeholder="默认空字符串" />
        <label class="form-label">fontSize</label>
        <input type="number" id="exportFontSize" class="form-input" min="1" step="1" />
        <label class="form-label">fontColor</label>
        <input type="text" id="exportFontColor" class="form-input" placeholder="#000000" />
        <label class="form-label">paddingX（字符串字段文字与边框水平内边距）</label>
        <input type="number" id="exportPaddingX" class="form-input" min="0" step="1" />
        <label class="form-label">paddingY（字符串字段文字与边框垂直内边距）</label>
        <input type="number" id="exportPaddingY" class="form-input" min="0" step="1" />
      </div>
      <div class="modal-footer">
        <button type="button" id="exportModalCancel" class="btn btn-cancel">取消导出</button>
        <button type="button" id="exportModalConfirm" class="btn btn-confirm">确认导出</button>
      </div>
    </div>
  </div>

  <main class="main">
    <div id="pdfContainer" class="pdf-container"></div>
    <aside id="sidebar" class="sidebar">
      <h3 class="sidebar-title">字段列表</h3>
      <ul id="fieldList" class="field-list"></ul>
      <div id="fieldForm" class="field-form hidden">
        <h4 class="form-title">编辑字段</h4>
        <label class="form-label">name</label>
        <input type="text" id="fieldName" class="form-input" placeholder="字段名" />
        <label class="form-label">type</label>
        <select id="fieldType" class="form-select">
          <option value="string">string</option>
          <option value="number">number</option>
          <option value="date">date</option>
          <option value="boolean">boolean</option>
          <option value="checkbox">checkbox</option>
        </select>
        <label class="form-label">description</label>
        <textarea id="fieldDescription" class="form-textarea" placeholder="描述" rows="3"></textarea>
      </div>
    </aside>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
