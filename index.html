<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Field Annotation Tool</title>
</head>
<body>
  <header class="toolbar">
    <label class="file-label">
      <span>Select PDF</span>
      <input type="file" id="fileInput" accept="application/pdf" />
    </label>
    <button type="button" id="exportBtn" class="btn-export" disabled>Export JSON</button>
    <label class="file-label">
      <span>Import JSON</span>
      <input type="file" id="importJsonInput" accept=".json,application/json" />
    </label>
    <span id="status" class="status"></span>
  </header>

  <!-- Export options modal -->
  <div id="exportModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="exportModalBackdrop"></div>
    <div class="modal-dialog">
      <h3 class="modal-title">Export Options</h3>
      <div class="modal-body">
        <label class="form-label">checkboxSymbol (image path for checkbox symbol)</label>
        <input type="text" id="exportCheckboxSymbol" class="form-input" placeholder="Default empty string" />
        <label class="form-label">fontSize</label>
        <input type="number" id="exportFontSize" class="form-input" min="1" step="1" />
        <label class="form-label">fontColor</label>
        <input type="text" id="exportFontColor" class="form-input" placeholder="#000000" />
        <label class="form-label">paddingX (horizontal padding for text fields)</label>
        <input type="number" id="exportPaddingX" class="form-input" min="0" step="1" />
        <label class="form-label">paddingY (vertical padding for text fields)</label>
        <input type="number" id="exportPaddingY" class="form-input" min="0" step="1" />
      </div>
      <div class="modal-footer">
        <button type="button" id="exportModalCancel" class="btn btn-cancel">Cancel</button>
        <button type="button" id="exportModalConfirm" class="btn btn-confirm">Export</button>
      </div>
    </div>
  </div>

  <main class="main">
    <div id="pdfContainer" class="pdf-container"></div>
    <aside id="sidebar" class="sidebar">
      <h3 class="sidebar-title">Field List</h3>
      <ul id="fieldList" class="field-list"></ul>
      <div id="fieldForm" class="field-form hidden">
        <h4 class="form-title">Edit Field</h4>
        <label class="form-label">name</label>
        <input type="text" id="fieldName" class="form-input" placeholder="Field name" />
        <label class="form-label">type</label>
        <select id="fieldType" class="form-select">
          <option value="string">string</option>
          <option value="number">number</option>
          <option value="date">date</option>
          <option value="boolean">boolean</option>
          <option value="checkbox">checkbox</option>
        </select>
        <label class="form-label">description</label>
        <textarea id="fieldDescription" class="form-textarea" placeholder="Description" rows="3"></textarea>
        <label class="form-label">verticalAlign</label>
        <select id="fieldVerticalAlign" class="form-select">
          <option value="top">top</option>
          <option value="middle">middle</option>
          <option value="bottom">bottom</option>
        </select>
      </div>
    </aside>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
